        /* ==========================================================================
           3D Dipole Antenna & Electromagnetic Wave Simulation Styles
           ========================================================================== */
        :root {
            --dipole-scale: 1.0;
            --dipole-dur: 1.6s;
        }

        .dipole-sim-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .dipole-svg-wrap {
            background-color: #0b1220;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .dipole-svg-wrap svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* SVG Glowing Lines and Elements */
        .dipole-axis {
            stroke: rgba(148, 163, 184, 0.25);
            stroke-width: 1.2;
            stroke-dasharray: 4 4;
        }

        .dipole-axis-solid {
            stroke: rgba(148, 163, 184, 0.4);
            stroke-width: 1.5;
        }

        .dipole-wave-e {
            stroke: #22d3ee; /* Cyan */
            stroke-width: 2.5;
            fill: none;
            filter: drop-shadow(0 0 4px rgba(34, 211, 238, 0.7));
        }

        .dipole-wave-b {
            stroke: #f97316; /* Orange */
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(0 0 4px rgba(249, 115, 22, 0.7));
        }

        .dipole-vector-e {
            stroke: rgba(34, 211, 238, 0.5);
            stroke-width: 1.2;
        }

        .dipole-vector-b {
            stroke: rgba(249, 115, 22, 0.5);
            stroke-width: 1.2;
        }

        /* Accelerating Charge Animation Styles */
        .charge-track {
            stroke: #475569;
            stroke-width: 1.5;
            stroke-dasharray: 3 3;
        }

        .charge-group {
            animation: charge-shm var(--dipole-dur) linear infinite; /* Using linear interpolation to prevent equilibrium stutter */
        }

        /* Wave Translation Animation */
        .dipole-wave-group {
            animation: dipole-wave-travel var(--dipole-dur) linear infinite;
        }

        /* Static and Radial Field Styles */
        .charge-track {
            stroke: #475569;
            stroke-width: 1.5;
            stroke-dasharray: 3 3;
        }

        .static-radial-fields line {
            stroke: rgba(34, 211, 238, 0.75);
            stroke-width: 1.8px;
            filter: drop-shadow(0 0 2px rgba(34, 211, 238, 0.4));
        }

        .dipole-wave-static {
            stroke: #22d3ee;
            stroke-width: 2.5;
            fill: none;
            filter: drop-shadow(0 0 4px rgba(34, 211, 238, 0.7));
        }

        /* 2D Plane Shading Sheets for E and B Fields */
        .dipole-wave-e-fill {
            fill: rgba(34, 211, 238, 0.15); /* Semi-transparent cyan sheet */
            stroke: none;
        }

        .dipole-wave-b-fill {
            fill: rgba(249, 115, 22, 0.12); /* Semi-transparent orange sheet */
            stroke: none;
        }

        /* Keyframe Animations */
        @keyframes dipole-wave-travel {
            0% {
                transform: translate(-160px, 0);
            }
            100% {
                transform: translate(0px, 0);
            }
        }

        /* Perfectly smooth linear-interpolated sine wave SHM to avoid slowing down at the center */
        @keyframes charge-shm {
            0% { transform: translateY(0px); }
            12.5% { transform: translateY(33.94px); }
            25% { transform: translateY(48px); }
            37.5% { transform: translateY(33.94px); }
            50% { transform: translateY(0px); }
            62.5% { transform: translateY(-33.94px); }
            75% { transform: translateY(-48px); }
            87.5% { transform: translateY(-33.94px); }
            100% { transform: translateY(0px); }
        }

        /* Playback States */
        .dipole-sim-container.paused .dipole-wave-group,
        .dipole-sim-container.paused .charge-group {
            animation-play-state: paused !important;
        }

        /* ==========================================================================
           Learning Stages Visibility Logic
           ========================================================================== */
        
        /* 1. Stage 1: Static Charge (Static E-Field) */
        .dipole-sim-container.stage-1 .charge-group {
            animation-play-state: paused !important;
            transform: translateY(0px) !important;
        }
        .dipole-sim-container.stage-1 .dipole-wave-group {
            animation-play-state: paused !important;
            transform: translate(0px, 0) !important;
        }
        .dipole-sim-container.stage-1 .static-radial-fields,
        .dipole-sim-container.stage-1 .dipole-wave-static,
        .dipole-sim-container.stage-1 .static-wave-arrows {
            display: block !important;
        }
        .dipole-sim-container.stage-1 .dipole-wave-e,
        .dipole-sim-container.stage-1 .dipole-wave-b,
        .dipole-sim-container.stage-1 .dipole-wave-e-fill,
        .dipole-sim-container.stage-1 .dipole-wave-b-fill,
        .dipole-sim-container.stage-1 .dipole-vector-e,
        .dipole-sim-container.stage-1 .dipole-vector-b,
        .dipole-sim-container.stage-1 .dipole-b-axis {
            display: none !important;
        }

        /* 2. Stage 2: Oscillating E-Field Wave Only */
        .dipole-sim-container.stage-2 .static-radial-fields,
        .dipole-sim-container.stage-2 .dipole-wave-static,
        .dipole-sim-container.stage-2 .static-wave-arrows,
        .dipole-sim-container.stage-2 .dipole-wave-b,
        .dipole-sim-container.stage-2 .dipole-wave-b-fill,
        .dipole-sim-container.stage-2 .dipole-vector-b,
        .dipole-sim-container.stage-2 .dipole-b-axis {
            display: none !important;
        }
        .dipole-sim-container.stage-2 .dipole-wave-e,
        .dipole-sim-container.stage-2 .dipole-wave-e-fill,
        .dipole-sim-container.stage-2 .dipole-vector-e {
            display: block !important;
        }

        /* 3. Stage 3: Full EM Wave (E & B Orthogonal) */
        .dipole-sim-container.stage-3 .static-radial-fields,
        .dipole-sim-container.stage-3 .dipole-wave-static,
        .dipole-sim-container.stage-3 .static-wave-arrows {
            display: none !important;
        }
        .dipole-sim-container.stage-3 .dipole-wave-e,
        .dipole-sim-container.stage-3 .dipole-wave-b,
        .dipole-sim-container.stage-3 .dipole-wave-e-fill,
        .dipole-sim-container.stage-3 .dipole-wave-b-fill,
        .dipole-sim-container.stage-3 .dipole-vector-e,
        .dipole-sim-container.stage-3 .dipole-vector-b,
        .dipole-sim-container.stage-3 .dipole-b-axis {
            display: block !important;
        }

        /* Visibility Filters */
        .dipole-sim-container.hide-e .dipole-wave-e,
        .dipole-sim-container.hide-e .dipole-vector-e,
        .dipole-sim-container.hide-e .dipole-e-axis {
            display: none !important;
        }

        .dipole-sim-container.hide-b .dipole-wave-b,
        .dipole-sim-container.hide-b .dipole-vector-b,
        .dipole-sim-container.hide-b .dipole-b-axis {
            display: none !important;
        }

        /* Override prefers-reduced-motion specifically for this educational simulation */
        @media (prefers-reduced-motion: reduce) {
            .dipole-sim-container,
            .dipole-sim-container * {
                animation-duration: var(--dipole-dur) !important;
                animation-iteration-count: infinite !important;
                transition-duration: 0.2s !important;
            }
            .charge-group {
                animation-name: charge-shm !important;
                animation-timing-function: linear !important;
            }
            .dipole-wave-group {
                animation-name: dipole-wave-travel !important;
                animation-timing-function: linear !important;
            }
        }

        /* 常考情境專欄：以「題幹訊號 → 物理翻譯 → 起手式」作為固定閱讀軌 */
        .context-hero {
            position: relative;
            margin-bottom: 1.25rem;
            padding: 1.5rem 1.6rem;
            color: #173640;
            background: #eef5f4;
            border: 1px solid #d4e4e1;
            border-left: 6px solid #2f7476;
            border-radius: 12px;
            overflow: hidden;
        }

        .context-hero::after {
            content: 'MODEL';
            position: absolute;
            right: 1.1rem;
            bottom: -0.45rem;
            color: rgba(47, 116, 118, 0.08);
            font: 800 4.2rem/1 ui-monospace, SFMono-Regular, Consolas, monospace;
            letter-spacing: -0.08em;
            pointer-events: none;
        }

        .context-hero strong {
            display: block;
            max-width: 720px;
            margin-bottom: 0.45rem;
            font-size: clamp(1.25rem, 2.2vw, 1.75rem);
            line-height: 1.35;
        }

        .context-hero p {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0;
            color: #56717a;
            line-height: 1.75;
        }

        .context-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
            align-items: start;
        }

        .context-card {
            --context-accent: #377f87;
            position: relative;
            min-width: 0;
            padding: 1.2rem 1.25rem 1.15rem;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--context-accent);
            border-radius: 11px;
            box-shadow: 0 10px 28px rgba(26, 58, 68, 0.07);
        }

        /* 響應式卡片內容排版 */
        .context-card-content {
            display: flex;
            gap: 1.5rem;
            align-items: center; /* 垂直置中 */
        }
        .context-card-left {
            flex: 1.3;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .context-card-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.8rem;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .context-card-svg {
            width: 100%;
            height: auto;
            max-width: 220px;
            max-height: 180px;
            display: block;
        }
        @media (max-width: 768px) {
            .context-card-content {
                flex-direction: column;
            }
            .context-card-right {
                flex: 0 0 auto;
                width: 100%;
                height: 200px;
            }
        }

        .context-card[data-tone="sky"] { --context-accent: #4386a8; }
        .context-card[data-tone="motion"] { --context-accent: #b87936; }
        .context-card[data-tone="wave"] { --context-accent: #397d7a; }
        .context-card[data-tone="orbit"] { --context-accent: #596faa; }
        .context-card[data-tone="medical"] { --context-accent: #a85e74; }
        .context-card[data-tone="energy"] { --context-accent: #548052; }
        .context-card[data-tone="induction"] { --context-accent: #755e9c; }
        .context-card[data-tone="quantum"] { --context-accent: #9a7033; }

        .context-card-head {
            display: flex;
            justify-content: space-between;
            gap: 0.8rem;
            align-items: flex-start;
            margin-bottom: 0.85rem;
        }

        .context-domain {
            color: var(--context-accent);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .context-card h3 {
            margin: 0.18rem 0 0;
            color: #183640;
            font-size: 1.18rem;
            line-height: 1.35;
        }

        .context-frequency {
            flex: 0 0 auto;
            padding: 0.25rem 0.48rem;
            color: #587078;
            background: #f1f5f4;
            border: 1px solid #dce6e4;
            border-radius: 5px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .context-translation {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto minmax(0, 1fr);
            gap: 0.4rem;
            align-items: stretch;
            margin-bottom: 0.9rem;
        }

        .context-translation-step {
            min-width: 0;
            padding: 0.62rem 0.65rem;
            background: #f7f9f8;
            border: 1px solid #e1e8e6;
            border-radius: 7px;
        }

        .context-translation-step span {
            display: block;
            margin-bottom: 0.25rem;
            color: var(--context-accent);
            font-size: 0.66rem;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .context-translation-step b {
            color: #35515a;
            font-size: 0.78rem;
            line-height: 1.45;
        }

        .context-arrow {
            align-self: center;
            color: #91a6ab;
            font-weight: 800;
        }

        .context-block {
            margin-top: 0.8rem;
            padding-top: 0.75rem;
            border-top: 1px dashed #d9e3e1;
        }

        .context-block-title {
            margin-bottom: 0.4rem;
            color: #38545d;
            font-size: 0.76rem;
            font-weight: 800;
        }

        .context-formulas {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .context-formula {
            padding: 0.32rem 0.48rem;
            color: #23434e;
            background: #edf4f3;
            border-radius: 5px;
            font: 700 0.78rem/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
        }

        .context-traps {
            margin: 0;
            padding-left: 1.05rem;
            color: #5a7078;
            font-size: 0.84rem;
            line-height: 1.65;
        }

        .context-exam-list {
            color: #647980;
            font-size: 0.78rem;
            line-height: 1.6;
        }

        .context-card-footer {
            display: flex;
            justify-content: space-between;
            gap: 0.7rem;
            align-items: center;
            margin-top: 0.9rem;
        }

        .context-node-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
        }

        .context-node-btn,
        .context-exam-btn {
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
        }

        .context-node-btn {
            padding: 0.28rem 0.45rem;
            color: #526b74;
            background: #ffffff;
            border: 1px solid #d8e2e0;
            font-size: 0.72rem;
        }

        .context-node-btn:hover { color: var(--context-accent); border-color: var(--context-accent); }

        .context-exam-btn {
            flex: 0 0 auto;
            padding: 0.42rem 0.6rem;
            color: #ffffff;
            background: var(--context-accent);
            border: 1px solid var(--context-accent);
            font-size: 0.75rem;
        }

        .context-exam-btn:hover { filter: brightness(0.94); transform: translateY(-1px); }

        @media (max-width: 860px) {
            .context-grid { grid-template-columns: minmax(0, 1fr); }
        }

        @media (max-width: 560px) {
            .context-hero { padding: 1.2rem; }
            .context-hero::after { font-size: 3rem; }
            .context-translation { grid-template-columns: minmax(0, 1fr); }
            .context-arrow { transform: rotate(90deg); justify-self: center; }
            .context-card-footer { align-items: flex-start; flex-direction: column; }
        }

        /* ===== 做題紀錄／錯題本／掌握度 ===== */
        .self-grade {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
            padding-top: 0.6rem;
            border-top: 1px dashed var(--border-color);
            font-size: 0.85rem;
        }
        .self-grade-label { font-weight: 700; color: var(--text-muted); }
        .self-grade button {
            border: 1px solid var(--border-color);
            background: var(--bg-card, #fff);
            border-radius: 8px;
            padding: 0.3rem 0.7rem;
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
        }
        .self-grade button:hover { border-color: var(--primary-blue); }
        .self-grade .sg-done { font-weight: 700; }
        .nav-badge {
            display: inline-block;
            min-width: 1.3em;
            padding: 0 0.35em;
            margin-left: 0.3em;
            border-radius: 999px;
            background: var(--accent-rose, #e11d48);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            text-align: center;
        }
        .mastery-cell { text-align: center; font-weight: 700; white-space: nowrap; }
        .mastery-good { color: var(--accent-green, #059669); }
        .mastery-mid { color: var(--accent-orange, #d97706); }
        .mastery-low { color: var(--accent-rose, #e11d48); }
        .mastery-none { color: var(--text-muted); font-weight: 500; }
        .wrong-summary {
            display: flex;
            gap: 1.25rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }
        .wrong-stat {
            flex: 1;
            min-width: 130px;
            background: var(--bg-card, #fff);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
        }
        .wrong-stat b { display: block; font-size: 1.4rem; color: var(--primary-blue); }
        .wrong-stat span { font-size: 0.8rem; color: var(--text-muted); }
    </style>
    <link rel="stylesheet" href="physics-theme.css">
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav id="sidebar">
        <div class="sidebar-brand">
            <h1>學測物理複習系統</h1>
            <p>108課綱 • 必修物理知識節點導航</p>
        </div>

        <button class="mobile-nav-toggle" type="button" aria-label="開啟導覽選單" aria-expanded="false" onclick="toggleMobileNav(this)">
            <span aria-hidden="true">☰</span>
        </button>

        <div class="nav-section-title">複習節點（依 27 個知識節點導航）</div>
        <ul class="nav-list" id="node-nav-list"></ul>

        <div class="nav-section-title">複習工具箱</div>
        <ul class="nav-list">
            <li><a class="nav-item" onclick="switchMainView(this, 'tool-summary')"><span class="nav-icon">🧭</span> 物理核心總整理</a></li>
            <li><a class="nav-item" onclick="switchMainView(this, 'tool-contexts')"><span class="nav-icon">🗂️</span> 常考情境專欄</a></li>
            <li><a class="nav-item" onclick="switchMainView(this, 'tool-lab')"><span class="nav-icon">🔬</span> 互動物理實驗室</a></li>
            <li><a class="nav-item" onclick="switchMainView(this, 'tool-quiz')"><span class="nav-icon">✏️</span> 知識節點分級題庫</a></li>
            <li><a class="nav-item" onclick="switchMainView(this, 'tool-exams')"><span class="nav-icon">📚</span> 歷屆試題練習</a></li>
            <li><a class="nav-item" onclick="switchMainView(this, 'tool-mock')"><span class="nav-icon">🧪</span> 模擬考練習（111–114）</a></li>
            <li><a class="nav-item" onclick="switchMainView(this, 'tool-wrong')"><span class="nav-icon">📕</span> 錯題本<span class="nav-badge" id="wrong-nav-badge" style="display:none;"></span></a></li>
            <li><a class="nav-item" onclick="switchMainView(this, 'tool-stats')"><span class="nav-icon">📊</span> 五年命題矩陣（節點層級）</a></li>
            <li><a class="nav-item" onclick="switchMainView(this, 'tool-buster')"><span class="nav-icon">⚡</span> 大考「素養包裝」破解器</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content">
        <!-- Content will be rendered dynamically -->
    </main>

    <script>
        // Switch Main view
        function switchMainView(navEl, targetId) {
            // Remove active classes
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            navEl.classList.add('active');

            if (window.labAnimationFrame) {
                cancelAnimationFrame(window.labAnimationFrame);
                window.labAnimationFrame = null;
            }

            if (window.matchMedia('(max-width: 1024px)').matches) {
                const sidebar = document.getElementById('sidebar');
                const toggle = sidebar.querySelector('.mobile-nav-toggle');
                sidebar.classList.remove('mobile-open');
                toggle.setAttribute('aria-expanded', 'false');
                toggle.setAttribute('aria-label', '開啟導覽選單');
                toggle.querySelector('span').textContent = '☰';
            }

            // Pause all running videos
            document.querySelectorAll('video').forEach(vid => vid.pause());

            const main = document.getElementById('main-content');

            // Trigger transition animation
            main.classList.remove('animate-in');
            void main.offsetWidth; // Force reflow
            main.classList.add('animate-in');

            if (targetId.startsWith('node-')) {
                renderNodeView(targetId.slice('node-'.length));
            } else if (targetId.startsWith('module-')) {
                const moduleNum = parseInt(targetId.split('-')[1]);
                renderModuleView(moduleNum);
            } else if (targetId === 'tool-lab') {
                renderInteractiveLab();
            } else if (targetId === 'tool-summary') {
                renderSummaryView();
            } else if (targetId === 'tool-contexts') {
                renderContextsView();
            } else if (targetId === 'tool-stats') {
                renderStatsView();
            } else if (targetId === 'tool-buster') {
                renderBusterView();
            } else if (targetId === 'tool-quiz') {
                renderBankView();
            } else if (targetId === 'tool-exams') {
                examNodeFilter = 'all';
                renderExamsView();
            } else if (targetId === 'tool-wrong') {
                renderWrongView();
            } else if (targetId === 'tool-mock') {
                renderMockView();
            } else if (targetId === 'tool-videos') {
                renderVideosView();
            }
        }

        function toggleMobileNav(button) {
            const sidebar = document.getElementById('sidebar');
            const isOpen = sidebar.classList.toggle('mobile-open');
            button.setAttribute('aria-expanded', String(isOpen));
            button.setAttribute('aria-label', isOpen ? '關閉導覽選單' : '開啟導覽選單');
            button.querySelector('span').textContent = isOpen ? '×' : '☰';
        }

        // 從節點頁點回模組總覽（renderModuleView）：清掉側欄 active、改標對應的模組標題
        function goToModuleOverview(moduleNum) {
            document.querySelectorAll('.nav-item, .nav-module-header').forEach(el => el.classList.remove('active'));
            const headers = document.querySelectorAll('.nav-module-header');
            if (headers[moduleNum - 1]) headers[moduleNum - 1].classList.add('active');
            renderModuleView(moduleNum);
            window.scrollTo(0, 0);
        }

        const nodeInteractiveLabs = {
            N07: { lab: 'astronomy', title: '天體運行與行星逆行（地心說 vs. 日心說）' },
            N14: { lab: 'wave', mode: 'huygens', title: '波動傳播與惠更斯原理' },
            N15: { lab: 'wave', mode: 'doppler', title: '聲波與都卜勒效應' },
            N16: { lab: 'wave', mode: 'refraction', title: '光的反射與折射' },
            N17: { lab: 'wave', mode: 'interference', title: '干涉、繞射與波動性' },
            N21: { lab: 'induction', title: '電磁感應與磁場變化' },
            N23: { lab: 'photo', title: '光電效應實驗' },
            N28: { lab: 'blackbody', title: '普朗克量子論與黑體輻射' }
        };

        function nodeInteractiveLabSectionHtml(nodeId) {
            const config = nodeInteractiveLabs[nodeId];
            if (!config) return '';
            return `
                <div class="handout-section-title">🔬 節點互動實驗｜${config.title}</div>
                <div id="node-interactive-lab" data-node="${nodeId}"></div>
            `;
        }

        function mountNodeInteractiveLab(nodeId) {
            const config = nodeInteractiveLabs[nodeId];
            const mount = document.getElementById('node-interactive-lab');
            if (!config || !mount) return false;
            mount.innerHTML = interactiveLabHtml();
            const header = mount.querySelector('.content-header');
            const switcher = mount.querySelector('.lab-switcher');
            if (header) header.remove();
            if (switcher && Array.isArray(config.labs)) {
                switcher.querySelectorAll('.lab-switch-btn').forEach(btn => {
                    if (!config.labs.includes(btn.dataset.lab)) btn.remove();
                });
                config.labs.forEach(labName => {
                    const btn = switcher.querySelector(`[data-lab="${labName}"]`);
                    if (btn) switcher.appendChild(btn);
                });
            } else if (switcher) {
                switcher.remove();
            }
            initializeInteractiveLab(config.lab, config.mode || 'reflection');
            if (config.lab === 'induction') {
                const auto = document.getElementById('ind-auto');
                if (auto) auto.checked = true;
                window.physicsLab.inductionStep = 3;
                document.querySelectorAll('.induction-step-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.step === '3'));
                updateInductionReadouts();
            }
            return true;
        }

        // 由 knowledgeNodes + modulesData 動態產生側欄的節點清單（依模組分組、模組標題可點回模組總覽）
        function buildNodeSidebar() {
            const list = document.getElementById('node-nav-list');
            let html = '';
            Object.keys(modulesData).map(Number).sort((a, b) => a - b).forEach(moduleNum => {
                html += `<li><a class="nav-module-header" onclick="switchMainView(this, 'module-${moduleNum}')">${modulesData[moduleNum].title}</a></li>`;
                knowledgeNodes.filter(n => n.module === moduleNum).forEach(n => {
                    html += `<li><a class="nav-item nav-item-node" onclick="switchMainView(this, 'node-${n.id}')"><span class="node-code-badge">${n.id}</span> ${n.name}</a></li>`;
                });
            });
            list.innerHTML = html;
        }

        // 節點專屬複習頁：彙整該節點在 modulesData 中被標記 node 的公式卡／關鍵特徵／歷屆真題卡，
        // 加上該節點的分級題庫與（如有）專題深化內容，取代整個模組長頁作為主要複習單位。
        function renderNodeView(nodeId) {
            const node = knowledgeNodes.find(n => n.id === nodeId);
            const main = document.getElementById('main-content');
            const hasNode = (item) => (Array.isArray(item.node) ? item.node : [item.node]).includes(nodeId);

            let formulas = [], keyFeatures = [], examQs = [];
            Object.values(modulesData).forEach(m => {
                formulas.push(...m.formulas.filter(hasNode));
                keyFeatures.push(...m.keyFeatures.filter(hasNode));
                examQs.push(...m.examQuestions.filter(hasNode));
            });

            let formulasHtml = '';
            if (formulas.length) {
                formulasHtml = '<div class="handout-section-title" style="margin-top:0;">📖 重點整理與核心公式</div><div class="formulas-grid">';
                formulas.forEach(f => {
                    const isMath = f.formula.includes('\\') || f.formula.includes('^') || f.formula.includes('_') || f.formula.includes('{') || f.formula.includes('}');
                    const displayHtml = isMath
                        ? `$$ ${f.formula} $$`
                        : `<div style="font-family: inherit; font-size: 1.05rem; font-weight: 600; text-align: center; color: var(--text-main); line-height: 1.6; white-space: normal; word-break: break-all;">${f.formula}</div>`;
                    formulasHtml += `
                        <div class="formula-card">
                            <div class="formula-card-title">📌 ${f.name}</div>
                            ${f.anchor ? `<div style="font-size:0.88rem; color:var(--accent-cyan); font-weight:700; margin-bottom:0.75rem; display:flex; align-items:center; gap:0.25rem;">🧠 大腦錨點：${f.anchor}</div>` : ''}
                            <div class="formula-display">${displayHtml}</div>
                            <div class="formula-desc">${f.desc}</div>
                        </div>
                    `;
                });
                formulasHtml += '</div>';
            }

            let featuresHtml = '';
            if (keyFeatures.length) {
                featuresHtml = `
                    <div class="handout-section-title">⚡ 關鍵特徵與思維引導</div>
                    <div class="features-grid">
                `;
                keyFeatures.forEach(kf => {
                    featuresHtml += `
                        <div class="feature-guide-box">
                            <div class="feature-trigger">
                                <span class="feature-trigger-tag">關鍵特徵</span>
                                <div class="feature-trigger-title">${kf.feature}</div>
                            </div>
                            <div class="feature-bridge">
                                <div class="feature-bridge-title">➔ 物理思維與模型解構</div>
                                <div class="feature-bridge-desc">${kf.bridge}</div>
                            </div>
                            <div class="feature-trap">
                                <div class="feature-trap-title">⚡ 易錯盲點避坑指南</div>
                                <div class="feature-trap-desc">${kf.trap}</div>
                            </div>
                        </div>
                    `;
                });
                featuresHtml += '</div>';
            }

            let examHtml = '';
            examQs.forEach(q => {
                examHtml += `
                    <div class="q-card" onclick="toggleQCard(this)">
                        <div class="q-card-header">
                            <span class="q-card-title">🔥 真題實戰：${q.year} - ${q.title}</span>
                            <span style="color: var(--primary-blue); font-weight:700;">展開詳解 ➔</span>
                        </div>
                        <div class="q-card-body">
                            <p>${q.desc}</p>
                        </div>
                    </div>
                `;
            });

            const specialHtml = (nodeId === 'N01' ? siSectionHtml() : '')
                + (nodeId === 'N02' ? scaleSectionHtml() : '')
                + (nodeId === 'N06' ? matterSectionHtml() : '')
                + (nodeId === 'N03' ? kinematicsGraphsHtml() : '')
                + (nodeId === 'N05' ? airResistanceSectionHtml() : '')
                + (nodeId === 'N07' ? keplerSectionHtml() : '')
                + (nodeId === 'N19' ? electrostaticsSectionHtml() : '')
                + (nodeId === 'N20' ? magnetismSectionHtml() : '')
                + (nodeId === 'N21' ? electromagneticInductionSectionHtml() : '')
                + (nodeId === 'N18' ? emSpectrumSectionHtml() : '')
                + (nodeId === 'N23' ? photoelectricSectionHtml() : '')
                + (nodeId === 'N28' ? blackbodyQuantumSectionHtml() : '')
                + (nodeId === 'N27' ? fourForcesSectionHtml() : '');
            const interactiveLabSection = nodeInteractiveLabSectionHtml(nodeId);

            const lvOrder = { '記憶': 1, '理解': 2, '應用': 3, '分析': 4 };
            const qs = questionBank.filter(q => q.node === nodeId).sort((a, b) => lvOrder[a.level] - lvOrder[b.level]);
            let quizHtml = '';
            if (qs.length) {

                    if (trailsGroup && particlesGroup) {
                        for (let i = rutherfordActiveParticles.length - 1; i >= 0; i--) {
                            const p = rutherfordActiveParticles[i];
                            if (p.index < p.pts.length) {
                                const pt = p.pts[p.index];
                                p.circleEl.setAttribute('cx', pt.x);
                                p.circleEl.setAttribute('cy', pt.y);
                                
                                if (p.index === 0) {
                                    p.pathD = `M ${pt.x} ${pt.y}`;
                                } else {
                                    p.pathD += ` L ${pt.x} ${pt.y}`;
                                }
                                p.pathEl.setAttribute('d', p.pathD);
                                
                                p.index += 3;
                            } else {
                                p.circleEl.remove();
                                p.pathEl.setAttribute('opacity', '0.2');
                                rutherfordActiveParticles.splice(i, 1);
                            }
                        }
                    }
                    requestAnimationFrame(animate);
                }
                requestAnimationFrame(animate);
                rutherfordSimInterval = true;
            }
        }

        function fireAlpha(b) {
            const trailsGroup = document.getElementById('rutherford-trails-group');
            const particlesGroup = document.getElementById('rutherford-particles-group');
            if (!trailsGroup || !particlesGroup) return;

            const pts = calculateRutherfordPath(b);
            if (pts.length === 0) return;
            
            const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            pathEl.setAttribute('fill', 'none');
            const isBackScattered = pts.length > 0 && pts[pts.length-1].x < 280;
            pathEl.setAttribute('stroke', isBackScattered ? '#ef4444' : '#fbbf24');
            pathEl.setAttribute('stroke-width', '1.5');
            pathEl.setAttribute('opacity', '0.6');
            trailsGroup.appendChild(pathEl);

            const circleEl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circleEl.setAttribute('r', '3');
            circleEl.setAttribute('fill', '#ffffff');
            circleEl.setAttribute('stroke', '#fbbf24');
            circleEl.setAttribute('stroke-width', '1');
            particlesGroup.appendChild(circleEl);

            rutherfordActiveParticles.push({
                pts: pts,
                index: 0,
                pathEl: pathEl,
                circleEl: circleEl,
                pathD: ''
            });
        }

        function calculateRutherfordPath(b) {
            let pts = [];
            let px = 50 - 320;
            let py = b;
            let vx = 9.0;
            let vy = 0.0;
            const dt = 0.5;
            const kZZ = 1900;
            
            for (let step = 0; step < 300; step++) {
                let r2 = px*px + py*py;
                let r = Math.sqrt(r2);
                if (r < 8) break;
                
                let force = kZZ / (r2 * r);
                let ax = force * px;
                let ay = force * py;
                
                vx += ax * dt;
                vy += ay * dt;
                px += vx * dt;
                py += vy * dt;
                
                let absX = px + 320;
                let absY = py + 140;
                
                pts.push({x: absX, y: absY});
                if (absX < 0 || absX > 520 || absY < 0 || absY > 280) {
                    break;
                }
            }
            return pts;
        }

                note.innerHTML = '灰色細線是兩列相同的波（第二列沿傳播方向多走了 Δ）；藍色粗線是兩波「疊加」的合成波。拖動滑桿觀察：Δ = 0、1λ、2λ 時波峰對波峰（加強）；Δ = 0.5λ、1.5λ 時波峰對波谷（相消）。';

        function initWaveSim() {
            const canvas = document.getElementById('wave-sim-canvas');
            if (!canvas) return;
            if (waveSimState.raf) cancelAnimationFrame(waveSimState.raf);
            buildWaveSimControls();
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height, mid = H / 2;
            waveSimState.t0 = performance.now();

            function frame(now) {
                if (!document.getElementById('wave-sim-canvas')) { waveSimState.raf = null; return; }
                const s = waveSimState;
                const t = (now - s.t0) / 1000;
                ctx.clearRect(0, 0, W, H);
                // 中線
                ctx.strokeStyle = 'rgba(148,163,184,0.35)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();

                if (s.mode === 'travel') {
                    const lam = (s.v / s.f) * 3;   // 顯示比例：1 格 = 3px
                    const A = s.A * 1.6;
                    ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    for (let x = 0; x <= W; x += 2) {
                        const y = mid - A * Math.sin(2 * Math.PI * (x / lam - s.f * t));
                        (x === 0) ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    // 一個波長的標示（找 t 時刻的波峰位置起算）
                    const xPeak = ((0.25 + s.f * t) % 1) * lam;
                    ctx.strokeStyle = 'rgba(251,191,36,0.9)'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(xPeak, mid - A - 14); ctx.lineTo(xPeak + lam, mid - A - 14); ctx.stroke();
                    ctx.fillStyle = 'rgba(251,191,36,0.95)'; ctx.font = '13px sans-serif';
                    ctx.fillText('λ', xPeak + lam / 2 - 4, mid - A - 20);
                    [xPeak, xPeak + lam].forEach(px => { ctx.beginPath(); ctx.moveTo(px, mid - A - 20); ctx.lineTo(px, mid - A - 8); ctx.stroke(); });
                    // 介質質點（紅點，原地振動）
                    const xDot = W * 0.32;
                    const yDot = mid - A * Math.sin(2 * Math.PI * (xDot / lam - s.f * t));
                    ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(244,63,94,0.5)';
                    ctx.beginPath(); ctx.moveTo(xDot, mid - A - 4); ctx.lineTo(xDot, mid + A + 4); ctx.stroke(); ctx.setLineDash([]);
                    ctx.fillStyle = '#f43f5e';
                    ctx.beginPath(); ctx.arc(xDot, yDot, 7, 0, Math.PI * 2); ctx.fill();
                    // 傳播方向箭頭
                    ctx.fillStyle = 'rgba(226,232,240,0.9)'; ctx.font = '13px sans-serif';
                    ctx.fillText('波的傳播方向 →', W - 150, 22);
                } else {
                    const lam = 240, A = 38, d = s.delta;
                    const y1 = x => A * Math.sin(2 * Math.PI * (x / lam - 0.8 * t));
                    const y2 = x => A * Math.sin(2 * Math.PI * (x / lam - 0.8 * t + d));
                    // 兩列分量波（細灰）
                    ctx.lineWidth = 1.2;
                    [['rgba(148,163,184,0.55)', y1], ['rgba(148,163,184,0.55)', y2]].forEach(([col, fn]) => {
                        ctx.strokeStyle = col; ctx.beginPath();
                        for (let x = 0; x <= W; x += 2) { const y = mid - fn(x); (x === 0) ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
                        ctx.stroke();
                    });
                    // 合成波（粗藍）
                    ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 3;
                    ctx.beginPath();
                    for (let x = 0; x <= W; x += 2) { const y = mid - (y1(x) + y2(x)); (x === 0) ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(226,232,240,0.9)'; ctx.font = '13px sans-serif';
                    ctx.fillText('細灰線＝兩列分量波；粗藍線＝疊加後的合成波', 12, 20);
                }
                waveSimState.raf = requestAnimationFrame(frame);
            }
            waveSimState.raf = requestAnimationFrame(frame);
        }

        // ===== 互動模擬三：交流發電機與感應電流判斷——併入模組六（N21 電磁感應） =====
        // physics-mode: analytical（相位直接決定磁力線穿越量、電動勢與輸出）
        // 物理約定：φ=0 時線圈面平行磁場，穿過線圈的磁力線數目為 0、感應電動勢最大；
        // φ=90° 時線圈面正對磁極，穿過線圈的磁力線數目最多、感應電動勢瞬間為 0。
        // 因此 Φ/Φmax = poleDir·sinφ，ε/εmax = −poleDir·dir·cosφ。
        const generatorState = {
            phi: 0.9, omega: 1.6, dir: 1, playing: true, raf: null, lastTs: 0,
            poleDir: 1, slipRings: true,
            showField: true, showCurrent: true, showMeter: true,
            quiz: null, streak: 0, ansCount: 0, corrCount: 0,
            _resizeObserver: null, _instanceId: 0
        };

        // 感應電流帶號值（相對，−1~1）：>0 規定導體 a 電流「流出紙面(⊙)」
        function genCurrent(phi, dir, poleDir = 1) { return -Math.cos(phi) * dir * poleDir; }
        function genElectricalState(state) {
            const flux = state.poleDir * Math.sin(state.phi);
            const emf = -state.poleDir * state.dir * Math.cos(state.phi) * state.omega;
            // 外電路視為純電阻負載：I=ε/R；以 Imax 正規化時，波形與 ε 相同。
            // 分裂換向器每半圈交換線圈端點，因此固定電刷側得到 |ε| 的單向脈動電流。
            const externalCurrent = state.slipRings ? emf : Math.abs(emf);
            const normalizedEmf = state.omega > 0 ? emf / state.omega : 0;
            const normalizedCurrent = state.omega > 0 ? externalCurrent / state.omega : 0;
            const currentLevel = Math.min(1, Math.abs(externalCurrent) / 2.6);
            return {
                flux,
                emf,
                externalCurrent,
                output: externalCurrent,
                normalizedEmf,
                normalizedCurrent,
                normalizedOutput: normalizedCurrent,
                brightness: currentLevel * currentLevel
            };
        }
        // 分類此刻感應電流大小/趨勢：'max' | 'zero' | 'rising' | 'falling'
        function genMagClass(phi, dir) {
            const mag = Math.abs(Math.cos(phi));
            if (mag >= 0.94) return 'max';
            if (mag <= 0.08) return 'zero';
            // |cos| 的變化趨勢：d|cosφ|/dt 符號
            const trend = -Math.sign(Math.cos(phi)) * Math.sin(phi) * generatorState.omega * dir;
            return trend > 0 ? 'rising' : 'falling';
        }
        // 穿過線圈的磁力線數目正在增加或減少：sign(dΦ/dt), Φ∝sinφ
        function genFluxTrend(phi, dir, poleDir = 1) {
            return Math.sign(Math.cos(phi) * generatorState.omega * dir * poleDir);
        }

        const gen3DState = {
            scene: null, camera: null, renderer: null, raf: null,
            phi: 0, omega: 1.6, dir: 1, poleDir: 1, playing: true, lastTs: 0,
            trackCamera: false, slipRings: true, showField: true, showCurrent: true,
            showFlux: true, transparentMagnets: false,
            camDist: 205, theta: 0.22, elev: 0.58, dragging: false, lastX: 0, lastY: 0,
            magN: null, magS: null, rotorGroup: null, coilFace: null,
            ringACGroup: null, ringDCGroup: null, circuitACGroup: null, circuitDCGroup: null,
            fieldGroup: null, currentGroup: null, iArrows: [], coilCurrentMarkers: [], matN: null, matS: null,
            bulbLight: null, bulbGlassMat: null, filamentMat: null,
            _onDown: null, _onMove: null, _onUp: null, _resizeObserver: null, instanceId: 0
        };

        function dispose3DGenerator() {
            const s = gen3DState;
            s.instanceId += 1;
            if (s.raf) cancelAnimationFrame(s.raf);
            s.raf = null;
            s.lastTs = 0;
            if (s._resizeObserver) s._resizeObserver.disconnect();
            s._resizeObserver = null;
            const canvas = s.renderer && s.renderer.domElement;
            if (canvas && s._onDown) canvas.removeEventListener('pointerdown', s._onDown);
            if (canvas && s._onMove) canvas.removeEventListener('pointermove', s._onMove);
            if (canvas && s._onUp) {
                canvas.removeEventListener('pointerup', s._onUp);
                canvas.removeEventListener('pointercancel', s._onUp);
            }
            s._onDown = s._onMove = s._onUp = null;
            if (s.scene) {
                const disposedTextures = new Set();
                s.scene.traverse(object => {
                    if (object.geometry) object.geometry.dispose();
                    const materials = Array.isArray(object.material) ? object.material : [object.material];
                    materials.filter(Boolean).forEach(material => {
                        Object.values(material).forEach(value => {
                            if (value && value.isTexture && !disposedTextures.has(value)) {
                                value.dispose();
                                disposedTextures.add(value);
                            }
                        });
                        material.dispose();
                    });
                });
            }
            if (s.renderer) s.renderer.dispose();
            s.renderer = null;
            s.scene = null;
            s.camera = null;
            s.magN = s.magS = s.rotorGroup = s.coilFace = null;
            s.ringACGroup = s.ringDCGroup = s.circuitACGroup = s.circuitDCGroup = null;
            s.fieldGroup = s.currentGroup = null;
            s.iArrows = [];
            s.coilCurrentMarkers = [];
        }

        function init3DGenerator() {
            const canvas = document.getElementById('gen3d-canvas');
            const viewport = document.getElementById('gen3d-viewport');
            const fallback = document.getElementById('gen3d-fallback');
            if (!canvas || !viewport) return;
            if (window.__threeReady === undefined) {
                window.addEventListener('three-status', init3DGenerator, { once: true });
                return;
            }
            if (!window.__threeReady) {
                canvas.style.display = 'none';
                if (fallback) fallback.style.display = 'block';
                return;
            }
            canvas.style.display = 'block';
            if (fallback) fallback.style.display = 'none';
            dispose3DGenerator();

            const THREE = window.THREE;
            const s = gen3DState;
            const copperMat = new THREE.MeshStandardMaterial({ color: 0xbd6b24, metalness: 0.72, roughness: 0.24 });
            const darkCopperMat = new THREE.MeshStandardMaterial({ color: 0x8f5428, metalness: 0.55, roughness: 0.34 });
            const rotorLeadMatA = new THREE.MeshBasicMaterial({ color: 0x8a4fd2 });
            const rotorLeadMatB = new THREE.MeshBasicMaterial({ color: 0x00a18a });
            const leadGuideMat = new THREE.MeshStandardMaterial({
                color: 0xe7f1f6,
                metalness: 0.02,
                roughness: 0.68,
                transparent: true,
                opacity: 0.42,
                depthWrite: false
            });
            const steelMat = new THREE.MeshStandardMaterial({ color: 0x8597a6, metalness: 0.62, roughness: 0.3 });
            const carbonMat = new THREE.MeshStandardMaterial({ color: 0x394c5c, metalness: 0.08, roughness: 0.72 });

            const makeCylinderBetween = (from, to, radius, material, radial = 12) => {
                const delta = new THREE.Vector3().subVectors(to, from);
                const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, delta.length(), radial), material);
                mesh.position.copy(from).add(to).multiplyScalar(0.5);
                mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), delta.normalize());
                return mesh;
            };
            const makeWirePath = (points, material, radius = 0.035) => {
                const group = new THREE.Group();
                for (let index = 0; index < points.length - 1; index += 1) {
                    group.add(makeCylinderBetween(points[index], points[index + 1], radius, material, 10));
                }
                return group;
            };
            const makeLabel = (text, color) => {
                const labelCanvas = document.createElement('canvas');
                labelCanvas.width = 128;
                labelCanvas.height = 128;
                const ctx = labelCanvas.getContext('2d');
                ctx.fillStyle = 'rgba(255,255,255,0.94)';
                ctx.beginPath();
                ctx.arc(64, 64, 46, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = color;
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.fillStyle = color;
                ctx.font = '900 58px Outfit, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, 64, 69);
                const texture = new THREE.CanvasTexture(labelCanvas);
                if ('colorSpace' in texture && THREE.SRGBColorSpace) texture.colorSpace = THREE.SRGBColorSpace;
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false }));
                sprite.scale.set(0.72, 0.72, 0.72);
                return sprite;
            };

            s.scene = new THREE.Scene();
            s.scene.background = new THREE.Color(0xf3f8fb);
            s.scene.fog = new THREE.Fog(0xf3f8fb, 12, 24);
            s.camera = new THREE.PerspectiveCamera(38, 1, 0.1, 60);
            s.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
            s.renderer.setClearColor(0xf3f8fb, 1);
            s.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            if ('outputColorSpace' in s.renderer && THREE.SRGBColorSpace) s.renderer.outputColorSpace = THREE.SRGBColorSpace;
            s.renderer.shadowMap.enabled = true;
            s.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            s.scene.add(new THREE.HemisphereLight(0xffffff, 0xb8c8d3, 1.25));
            const keyLight = new THREE.DirectionalLight(0xffffff, 1.45);
            keyLight.position.set(5, 9, 7);
            keyLight.castShadow = true;
            s.scene.add(keyLight);
            const fillLight = new THREE.DirectionalLight(0xb7dcff, 0.55);
            fillLight.position.set(-7, 3, -5);
            s.scene.add(fillLight);

            const base = new THREE.Mesh(
                new THREE.BoxGeometry(10.8, 0.22, 7.2),
                new THREE.MeshStandardMaterial({ color: 0xdfeaf0, roughness: 0.78, metalness: 0.02 })
            );
            base.position.y = -1.72;
            base.receiveShadow = true;
            s.scene.add(base);
            const baseEdge = new THREE.LineSegments(
                new THREE.EdgesGeometry(base.geometry),
                new THREE.LineBasicMaterial({ color: 0xa7bdcc })
            );
            baseEdge.position.copy(base.position);
            s.scene.add(baseEdge);
            const grid = new THREE.GridHelper(10, 10, 0xb8ccd9, 0xd4e1e8);
            grid.position.y = -1.595;
            s.scene.add(grid);

            const magGeo = new THREE.BoxGeometry(1.35, 3.05, 3.8);
            const shoeGeo = new THREE.BoxGeometry(0.52, 2.25, 3.0);
            s.matN = new THREE.MeshStandardMaterial({ color: 0xcd4e58, roughness: 0.48, metalness: 0.04 });
            s.matS = new THREE.MeshStandardMaterial({ color: 0x2f75b9, roughness: 0.48, metalness: 0.04 });
            const makePole = (material, label, labelColor) => {
                const group = new THREE.Group();
                const block = new THREE.Mesh(magGeo, material);
                const shoe = new THREE.Mesh(shoeGeo, material);
                block.castShadow = shoe.castShadow = true;
                group.add(block, shoe);
                const tag = makeLabel(label, labelColor);
                tag.position.set(0, 0.9, 2.0);
                group.add(tag);
                group.userData.shoe = shoe;
                return group;
            };
            s.magN = makePole(s.matN, 'N', '#c9464f');
            s.magS = makePole(s.matS, 'S', '#2c70b5');
            s.magN.userData.shoe.position.x = 0.86;
            s.magS.userData.shoe.position.x = -0.86;
            s.scene.add(s.magN, s.magS);

            s.fieldGroup = new THREE.Group();
            for (const y of [-0.72, 0, 0.72]) {
                for (const z of [-1.05, 0, 1.05]) {
                    const arrow = new THREE.ArrowHelper(
                        new THREE.Vector3(1, 0, 0),
                        new THREE.Vector3(-2.5, y, z),
                        5,
                        0x008f75,
                        0.42,
                        0.24
                    );
                    arrow.line.material.transparent = false;
                    arrow.line.material.opacity = 1;
                    arrow.cone.material.transparent = false;
                    arrow.cone.material.opacity = 1;
                    s.fieldGroup.add(arrow);
                }
            }
            s.scene.add(s.fieldGroup);

            // 旋轉軸只保留軸承附近的上下短軸，避免長桿遮住線圈與電流箭頭。
            const shaftBack = makeCylinderBetween(
                new THREE.Vector3(0, 0, -2.5),
                new THREE.Vector3(0, 0, -1.72),
                0.065,
                steelMat,
                18
            );
            const shaftFront = makeCylinderBetween(
                new THREE.Vector3(0, 0, 1.72),
                new THREE.Vector3(0, 0, 3.0),
                0.065,
                steelMat,
                18
            );
            shaftBack.castShadow = shaftFront.castShadow = true;
            s.scene.add(shaftBack, shaftFront);
            for (const z of [-2.0, 2.75]) {
                const stand = makeCylinderBetween(
                    new THREE.Vector3(0, -1.58, z),
                    new THREE.Vector3(0, -0.42, z),
                    0.075,
                    steelMat,
                    16
                );
                const bearing = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.075, 10, 24), carbonMat);
                bearing.position.set(0, 0, z);
                s.scene.add(stand, bearing);
            }

            s.rotorGroup = new THREE.Group();
            const halfX = 1.36;
            const halfZ = 1.5;
            const terminalGap = 0.24;
            // 單匝代表線圈：A、B 在近側中央留出缺口，導線路徑可由肉眼從頭追到尾。
            const windingPoints = [
                new THREE.Vector3(terminalGap, 0, halfZ),
                new THREE.Vector3(halfX, 0, halfZ),
                new THREE.Vector3(halfX, 0, -halfZ),
                new THREE.Vector3(-halfX, 0, -halfZ),
                new THREE.Vector3(-halfX, 0, halfZ),
                new THREE.Vector3(-terminalGap, 0, halfZ)
            ];
            const visibleCoilMat = new THREE.MeshStandardMaterial({
                color: 0xe2e8f0,
                roughness: 0.24,
                metalness: 0.72,
                emissive: 0x334155,
                emissiveIntensity: 0.08
            });
            const continuousWinding = makeWirePath(windingPoints, visibleCoilMat, 0.065);
            s.rotorGroup.add(continuousWinding);

            s.coilCurrentMarkers = [];
            const windingMarkerMat = new THREE.MeshBasicMaterial({ color: 0xe11d48, depthTest: false, transparent: true, opacity: 1 });
            const addWindingMarker = (from, to, positionRatio = 0.55) => {
                const direction = new THREE.Vector3().subVectors(to, from).normalize();
                const marker = new THREE.Group();
                const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.34, 14), windingMarkerMat);
                shaft.position.y = -0.06;
                const head = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.32, 18), windingMarkerMat);
                head.position.y = 0.24;
                shaft.renderOrder = head.renderOrder = 8;
                marker.add(shaft, head);
                marker.position.copy(from).lerp(to, positionRatio);
                marker.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
                marker.userData.positiveDirection = direction.clone();
                marker.userData.materials = [shaft.material, head.material];
                s.coilCurrentMarkers.push(marker);
                s.rotorGroup.add(marker);
            };
            // 箭頭貼在單匝導線的每一段；近側因 A、B 缺口分為左右兩段。
            for (let markerIndex = 0; markerIndex < windingPoints.length - 1; markerIndex += 1) {
                const from = windingPoints[markerIndex];
                const to = windingPoints[markerIndex + 1];
                addWindingMarker(from, to, 0.5);
            }

            const terminalA = windingPoints[0].clone();
            const terminalB = windingPoints[windingPoints.length - 1].clone();
            const terminalAVisual = new THREE.Mesh(new THREE.SphereGeometry(0.075, 16, 12), rotorLeadMatA);
            terminalAVisual.position.copy(terminalA);
            const terminalBVisual = new THREE.Mesh(new THREE.SphereGeometry(0.075, 16, 12), rotorLeadMatB);
            terminalBVisual.position.copy(terminalB);
            const terminalATag = makeLabel('A', '#8a4fd2');
            terminalATag.scale.set(0.3, 0.3, 0.3);
            terminalATag.position.copy(terminalA).add(new THREE.Vector3(0.16, 0.12, 0.08));
            const terminalBTag = makeLabel('B', '#008b78');
            terminalBTag.scale.set(0.3, 0.3, 0.3);
            terminalBTag.position.copy(terminalB).add(new THREE.Vector3(0.14, 0.12, 0.08));
            s.rotorGroup.add(terminalAVisual, terminalBVisual, terminalATag, terminalBTag);

            s.coilFace = new THREE.Mesh(
                new THREE.PlaneGeometry(halfX * 2, halfZ * 2),
                new THREE.MeshBasicMaterial({ color: 0x54b9df, transparent: true, opacity: 0.14, side: THREE.DoubleSide, depthWrite: false })
            );
            s.coilFace.rotation.x = Math.PI / 2;
            s.rotorGroup.add(s.coilFace);
            const normArrow = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), 1.35, 0x2878d0, 0.25, 0.13);
            s.rotorGroup.add(normArrow);

            s.ringACGroup = new THREE.Group();
            const ring1 = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.05, 12, 36), copperMat);
            const ring2 = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.05, 12, 36), copperMat);
            ring1.position.z = 1.9;
            ring2.position.z = 2.32;
            const acLead1 = makeWirePath([
                terminalA,
                new THREE.Vector3(0.28, 0.1, 1.7),
                new THREE.Vector3(0.25, 0.02, 1.9)
            ], rotorLeadMatA, 0.038);
            const acLead2 = makeWirePath([
                terminalB,
                new THREE.Vector3(-0.28, -0.1, 1.82),
                new THREE.Vector3(-0.25, -0.02, 2.32)
            ], rotorLeadMatB, 0.038);
            const acGuide1 = makeCylinderBetween(
                new THREE.Vector3(0.25, 0.04, 1.66),
                new THREE.Vector3(0.25, 0.04, 1.84),
                0.052,
                leadGuideMat,
                12
            );
            const acGuide2 = makeCylinderBetween(
                new THREE.Vector3(-0.25, -0.04, 1.66),
                new THREE.Vector3(-0.25, -0.04, 2.24),
                0.052,
                leadGuideMat,
                12
            );
            s.ringACGroup.add(ring1, ring2, acLead1, acLead2, acGuide1, acGuide2);
            s.rotorGroup.add(s.ringACGroup);

            s.ringDCGroup = new THREE.Group();
            const dc1 = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.34, 28, 1, true, 0.08, Math.PI - 0.16), copperMat);
            const dc2 = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.34, 28, 1, true, Math.PI + 0.08, Math.PI - 0.16), copperMat);
            dc1.rotation.x = dc2.rotation.x = Math.PI / 2;
            dc1.position.z = dc2.position.z = 2.12;
            const dcLead1 = makeWirePath([
                terminalA,
                new THREE.Vector3(0.28, 0.1, 1.78),
                new THREE.Vector3(0.25, 0.02, 2.12)
            ], rotorLeadMatA, 0.038);
            const dcLead2 = makeWirePath([
                terminalB,
                new THREE.Vector3(-0.28, -0.1, 1.82),
                new THREE.Vector3(-0.25, -0.02, 2.12)
            ], rotorLeadMatB, 0.038);
            const dcGuide1 = makeCylinderBetween(
                new THREE.Vector3(0.25, 0.04, 1.66),
                new THREE.Vector3(0.25, 0.04, 2.03),
                0.052,
                leadGuideMat,
                12
            );
            const dcGuide2 = makeCylinderBetween(
                new THREE.Vector3(-0.25, -0.04, 1.66),
                new THREE.Vector3(-0.25, -0.04, 2.03),
                0.052,
                leadGuideMat,
                12
            );
            s.ringDCGroup.add(dc1, dc2, dcLead1, dcLead2, dcGuide1, dcGuide2);
            s.rotorGroup.add(s.ringDCGroup);
            s.scene.add(s.rotorGroup);

            const makeBrush = (position, size = [0.18, 0.2, 0.24]) => {
                const brush = new THREE.Mesh(new THREE.BoxGeometry(...size), carbonMat);
                brush.position.copy(position);
                return brush;
            };
            const circuitWireMat = new THREE.MeshBasicMaterial({ color: 0x314e62 });
            const loadZ = 3.25;
            const circuitY = -1.12;
            const loadLeft = new THREE.Vector3(-0.44, circuitY, loadZ);
            const loadRight = new THREE.Vector3(0.44, circuitY, loadZ);
            const leftFrontCorner = new THREE.Vector3(-1.85, circuitY, loadZ);
            const rightFrontCorner = new THREE.Vector3(1.85, circuitY, loadZ);
            s.circuitACGroup = new THREE.Group();
            const acBrush1Pos = new THREE.Vector3(0.34, 0, 1.9);
            const acBrush2Pos = new THREE.Vector3(-0.34, 0, 2.32);
            s.circuitACGroup.add(
                makeBrush(acBrush1Pos),
                makeBrush(acBrush2Pos),
                makeWirePath([
                    acBrush1Pos,
                    new THREE.Vector3(0.62, 0, 1.9),
                    new THREE.Vector3(0.62, circuitY, 1.9),
                    new THREE.Vector3(1.85, circuitY, 1.9),
                    rightFrontCorner,
                    loadRight
                ], circuitWireMat, 0.05),
                makeWirePath([
                    acBrush2Pos,
                    new THREE.Vector3(-0.62, 0, 2.32),
                    new THREE.Vector3(-0.62, circuitY, 2.32),
                    new THREE.Vector3(-1.85, circuitY, 2.32),
                    leftFrontCorner,
                    loadLeft
                ], circuitWireMat, 0.05)
            );
            s.circuitDCGroup = new THREE.Group();
            const dcBrush1Pos = new THREE.Vector3(0.34, 0, 2.12);
            const dcBrush2Pos = new THREE.Vector3(-0.34, 0, 2.12);
            s.circuitDCGroup.add(
                makeBrush(dcBrush1Pos),
                makeBrush(dcBrush2Pos),
                makeWirePath([
                    dcBrush1Pos,
                    new THREE.Vector3(0.62, 0, 2.12),
                    new THREE.Vector3(0.62, circuitY, 2.12),
                    new THREE.Vector3(1.85, circuitY, 2.12),
                    rightFrontCorner,
                    loadRight
                ], circuitWireMat, 0.05),
                makeWirePath([
                    dcBrush2Pos,
                    new THREE.Vector3(-0.62, 0, 2.12),
                    new THREE.Vector3(-0.62, circuitY, 2.12),
                    new THREE.Vector3(-1.85, circuitY, 2.12),
                    leftFrontCorner,
                    loadLeft
                ], circuitWireMat, 0.05)
            );
            s.scene.add(s.circuitACGroup, s.circuitDCGroup);

            const loadGroup = new THREE.Group();
            const porcelainMat = new THREE.MeshStandardMaterial({ color: 0xf7fafc, roughness: 0.72, metalness: 0.02 });
            const brassMat = new THREE.MeshStandardMaterial({ color: 0xc99431, roughness: 0.35, metalness: 0.58 });
            const socket = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.35, 0.24, 28), porcelainMat);
            socket.position.y = 0.03;
            const screwBase = new THREE.Mesh(new THREE.CylinderGeometry(0.19, 0.22, 0.28, 24), brassMat);
            screwBase.position.y = 0.27;
            s.bulbGlassMat = new THREE.MeshStandardMaterial({
                color: 0xffe58a,
                emissive: 0xf5b942,
                emissiveIntensity: 0,
                transparent: true,
                opacity: 0.86,
                roughness: 0.12,
                side: THREE.DoubleSide
            });
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.2, 0.22, 24), s.bulbGlassMat);
            neck.position.y = 0.48;
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.42, 30, 22), s.bulbGlassMat);
            bulb.scale.y = 1.12;
            bulb.position.y = 0.78;
            s.filamentMat = new THREE.MeshBasicMaterial({ color: 0x8f6f35 });
            const filament = new THREE.Mesh(new THREE.TorusGeometry(0.105, 0.018, 8, 20, Math.PI), s.filamentMat);
            filament.position.y = 0.76;
            filament.rotation.z = Math.PI;
            const leadMat = new THREE.MeshBasicMaterial({ color: 0x6e7f8c });
            const filamentLead1 = makeCylinderBetween(
                new THREE.Vector3(-0.105, 0.39, 0),
                new THREE.Vector3(-0.105, 0.76, 0),
                0.012,
                leadMat,
                8
            );
            const filamentLead2 = makeCylinderBetween(
                new THREE.Vector3(0.105, 0.39, 0),
                new THREE.Vector3(0.105, 0.76, 0),
                0.012,
                leadMat,
                8
            );
            const leftTerminal = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.13, 0.16), brassMat);
            leftTerminal.position.set(-0.44, 0, 0);
            const rightTerminal = leftTerminal.clone();
            rightTerminal.position.x = 0.44;
            for (const y of [0.17, 0.24, 0.31, 0.38]) {
                const ridge = new THREE.Mesh(new THREE.TorusGeometry(0.215, 0.014, 8, 28), brassMat);
                ridge.rotation.x = Math.PI / 2;
                ridge.position.y = y;
                loadGroup.add(ridge);
            }
            s.bulbLight = new THREE.PointLight(0xffc84d, 0, 3.5);
            s.bulbLight.position.y = 0.78;
            loadGroup.add(
                socket,
                screwBase,
                neck,
                bulb,
                filament,
                filamentLead1,
                filamentLead2,
                leftTerminal,
                rightTerminal,
                s.bulbLight
            );
            loadGroup.position.set(0, circuitY, loadZ);
            s.scene.add(loadGroup);

            s.currentGroup = new THREE.Group();
            const makeCurrentArrow = (from, to) => {
                const direction = new THREE.Vector3().subVectors(to, from).normalize();
                const center = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
                center.y += 0.13;
                const origin = center.clone().addScaledVector(direction, -0.35);
                const arrow = new THREE.ArrowHelper(direction, origin, 0.7, 0xe11d48, 0.27, 0.16);
                const shaft = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.045, 0.045, 0.7, 12),
                    new THREE.MeshBasicMaterial({ color: 0xe11d48, depthTest: false })
                );
                shaft.position.y = 0.35;
                shaft.renderOrder = 9;
                arrow.add(shaft);
                arrow.line.visible = false;
                arrow.cone.material.depthTest = false;
                arrow.cone.renderOrder = 10;
                arrow.userData.positiveDirection = direction.clone();
                arrow.userData.segmentCenter = center;
                arrow.cone.material.transparent = true;
                arrow.userData.shaft = shaft;
                return arrow;
            };
            s.iArrows = [
                makeCurrentArrow(rightFrontCorner, loadRight),
                makeCurrentArrow(loadLeft, leftFrontCorner)
            ];
            s.currentGroup.add(...s.iArrows);
            s.scene.add(s.currentGroup);

            s._onDown = event => {
                s.dragging = true;
                s.lastX = event.clientX;
                s.lastY = event.clientY;
                canvas.setPointerCapture(event.pointerId);
            };
            s._onMove = event => {
                if (!s.dragging) return;
                const dx = event.clientX - s.lastX;
                const dy = event.clientY - s.lastY;
                s.lastX = event.clientX;
                s.lastY = event.clientY;
                s.theta -= dx * 0.008;
                s.elev = Math.max(-0.3, Math.min(1.05, s.elev - dy * 0.008));
                updateGen3DCamera();
                syncGen3DVisuals();
            };
            s._onUp = event => {
                s.dragging = false;
                if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
            };
            canvas.addEventListener('pointerdown', s._onDown);
            canvas.addEventListener('pointermove', s._onMove);
            canvas.addEventListener('pointerup', s._onUp);
            canvas.addEventListener('pointercancel', s._onUp);

            const resize = () => {
                if (!s.renderer || !s.camera) return;
                const rect = viewport.getBoundingClientRect();
                const width = Math.max(320, Math.round(rect.width));
                const height = Math.max(340, Math.round(rect.height));
                s.renderer.setSize(width, height, false);
                s.camera.aspect = width / height;
                s.camera.updateProjectionMatrix();
                syncGen3DVisuals();
            };
            s._resizeObserver = new ResizeObserver(resize);
            s._resizeObserver.observe(viewport);

            syncGen3DRings();
            syncGen3DMagnetOpacity();
            updateGen3DCamera();
            resize();
            updateGen3DReadout();
            s.lastTs = 0;
            const instanceId = s.instanceId;

            function loop(ts) {
                if (s.instanceId !== instanceId || !document.getElementById('gen3d-canvas') || !s.renderer) {
                    gen3DState.raf = null;
                    return;
                }
                const dt = s.lastTs ? Math.min((ts - s.lastTs) / 1000, 0.08) : 0;
                s.lastTs = ts;
                if (s.playing) {
                    s.phi = (s.phi + s.omega * s.dir * dt + Math.PI * 2) % (Math.PI * 2);
                }
                syncGen3DVisuals();
                updateGen3DReadout();
                s.raf = requestAnimationFrame(loop);
            }
            s.raf = requestAnimationFrame(loop);
        }

        function syncGen3DRings() {
            const s = gen3DState;
            if (!s.ringACGroup || !s.ringDCGroup) return;
            s.ringACGroup.visible = s.slipRings;
            s.ringDCGroup.visible = !s.slipRings;
            if (s.circuitACGroup) s.circuitACGroup.visible = s.slipRings;
            if (s.circuitDCGroup) s.circuitDCGroup.visible = !s.slipRings;
            const acButton = document.getElementById('gen3d-collector-ac');
            const dcButton = document.getElementById('gen3d-collector-dc');
            if (acButton) {
                acButton.classList.toggle('active', s.slipRings);
                acButton.setAttribute('aria-pressed', String(s.slipRings));
            }
            if (dcButton) {
                dcButton.classList.toggle('active', !s.slipRings);
                dcButton.setAttribute('aria-pressed', String(!s.slipRings));
            }
        }

        function syncGen3DMagnetOpacity() {
            const s = gen3DState;
            if (!s.matN || !s.matS) return;
            [s.matN, s.matS].forEach(material => {
                material.transparent = s.transparentMagnets;
                material.opacity = s.transparentMagnets ? 0.42 : 1;
                material.depthWrite = !s.transparentMagnets;
            });
            syncGen3DVisuals();
        }

        function updateGen3DCamera() {
            const s = gen3DState;
            if (!s.camera) return;
            const radius = s.camDist / 20;
            const theta = s.trackCamera ? -s.phi - 0.78 : s.theta;
            s.camera.position.set(
                radius * Math.cos(s.elev) * Math.sin(theta),
                radius * Math.sin(s.elev) + 0.65,
                radius * Math.cos(s.elev) * Math.cos(theta)
            );
            s.camera.lookAt(0, -0.1, 0.45);
            const value = document.getElementById('gen3d-zoom-val');
            if (value) value.textContent = s.camDist < 150 ? '近' : s.camDist > 200 ? '遠' : '中';
        }

        function syncGen3DVisuals() {
            const s = gen3DState;
            if (!s.scene || !s.renderer || !s.camera || !s.rotorGroup) return;
            const THREE = window.THREE;
            const poleX = 3.35;
            s.magN.position.x = -poleX * s.poleDir;
            s.magS.position.x = poleX * s.poleDir;
            s.magN.userData.shoe.position.x = 0.86 * s.poleDir;
            s.magS.userData.shoe.position.x = -0.86 * s.poleDir;
            if (s.fieldGroup) {
                s.fieldGroup.visible = s.showField;
                const direction = new THREE.Vector3(s.poleDir, 0, 0);
                s.fieldGroup.children.forEach(arrow => {
                    arrow.setDirection(direction);
                    arrow.position.x = -2.5 * s.poleDir;
                });
            }
            s.rotorGroup.rotation.z = s.phi;
            const electrical = genElectricalState(s);
            if (s.coilFace) {
                s.coilFace.visible = s.showFlux;
                s.coilFace.material.opacity = 0.08 + Math.abs(electrical.flux) * 0.24;
                s.coilFace.material.color.set(electrical.flux >= 0 ? 0x54b9df : 0xdf78a8);
            }
            const arrowVisible = s.showCurrent && Math.abs(electrical.output) > 0.08;
            if (s.currentGroup) s.currentGroup.visible = arrowVisible;
            if (s.coilCurrentMarkers.length) {
                // 正輸出時電流由 A 端流出至外電路，因此線圈內部沿 B → A 流動；
                // 這樣線圈箭頭、引線、燈泡旁箭頭可連成同一個閉合迴路。
                const coilSign = electrical.output >= 0 ? -1 : 1;
                const coilMagnitude = Math.abs(electrical.normalizedCurrent);
                s.coilCurrentMarkers.forEach(marker => {
                    marker.visible = arrowVisible;
                    const direction = marker.userData.positiveDirection.clone().multiplyScalar(coilSign);
                    marker.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
                    marker.userData.materials.forEach(material => {
                        material.opacity = 0.72 + coilMagnitude * 0.28;
                    });
                });
            }
            if (s.iArrows.length === 2) {
                const sign = electrical.output >= 0 ? 1 : -1;
                const magnitude = Math.abs(electrical.normalizedCurrent);
                s.iArrows.forEach(arrow => {
                    const direction = arrow.userData.positiveDirection.clone().multiplyScalar(sign);
                    const length = 0.38 + magnitude * 0.48;
                    arrow.userData.currentDirection = direction.clone();
                    arrow.userData.currentLength = length;
                    arrow.setDirection(direction);
                    arrow.position.copy(arrow.userData.segmentCenter).addScaledVector(direction, -length * 0.5);
                    arrow.setLength(length, 0.23 + magnitude * 0.09, 0.13 + magnitude * 0.05);
                    if (arrow.userData.shaft) {
                        arrow.userData.shaft.position.y = length * 0.5;
                        arrow.userData.shaft.scale.y = length / 0.7;
                        arrow.userData.shaft.material.opacity = 0.72 + magnitude * 0.28;
                        arrow.userData.shaft.material.transparent = magnitude < 0.99;
                    }
                    arrow.cone.material.opacity = 0.72 + magnitude * 0.28;
                });
            }
            if (s.bulbLight && s.bulbGlassMat && s.filamentMat) {
                s.bulbLight.intensity = electrical.brightness * 3.2;
                s.bulbGlassMat.emissiveIntensity = electrical.brightness * 2.1;
                s.filamentMat.color.set(electrical.brightness > 0.12 ? 0xffb51f : 0x8f6f35);
            }
            if (s.trackCamera) updateGen3DCamera();
            s.renderer.render(s.scene, s.camera);
        }

        function updateGen3DWaveform(electrical) {
            const s = gen3DState;
            const path = document.getElementById('gen3d-wave-path');
            const marker = document.getElementById('gen3d-wave-marker');
            if (!path || !marker) return;
            const points = [];
            for (let index = 0; index <= 100; index += 1) {
                const phase = index / 100 * Math.PI * 2;
                const ac = -Math.cos(phase) * s.dir * s.poleDir;
                const value = s.slipRings ? ac : Math.abs(ac);
                points.push(`${index === 0 ? 'M' : 'L'} ${(4 + index * 2.12).toFixed(1)} ${(31 - value * 22).toFixed(1)}`);
            }
            path.setAttribute('d', points.join(' '));
            const phase = ((s.phi % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            marker.setAttribute('cx', (4 + phase / (Math.PI * 2) * 212).toFixed(1));
            marker.setAttribute('cy', (31 - electrical.normalizedOutput * 22).toFixed(1));
        }

        function updateGen3DReadout() {
            const s = gen3DState;
            const electrical = genElectricalState(s);
            const setText = (id, text) => {
                const element = document.getElementById(id);
                if (element) element.textContent = text;
            };
            setText('gen3d-flux-value', `${electrical.flux >= 0 ? '+' : ''}${electrical.flux.toFixed(2)} Φmax`);
            setText('gen3d-emf-value', `${electrical.normalizedEmf >= 0 ? '+' : ''}${electrical.normalizedEmf.toFixed(2)} εmax`);
            setText(
                'gen3d-output-value',
                `${electrical.normalizedCurrent >= 0 ? '+' : ''}${electrical.normalizedCurrent.toFixed(2)} Imax`
            );
            setText('gen3d-load-value', `${Math.round(electrical.brightness * 100)}%`);
            setText('gen3d-speed-value', `${s.omega.toFixed(1)}×`);
            setText('gen3d-status', s.playing ? '運轉中' : '已暫停');
            const playButton = document.getElementById('gen3d-play-btn');
            if (playButton) playButton.textContent = s.playing ? '暫停' : '播放';
            const derivative = s.poleDir * Math.cos(s.phi) * s.omega * s.dir;
            const fluxText = Math.abs(derivative) < 0.06 ? '位於極值，瞬間不變' : derivative > 0 ? '正在增加' : '正在減少';
            const emfText = Math.abs(electrical.normalizedEmf) > 0.92 ? '接近最大' : Math.abs(electrical.normalizedEmf) < 0.08 ? '接近零' : '中等';
            const ro = document.getElementById('gen3d-sim-readout');
            if (ro) {
                ro.innerHTML = `
