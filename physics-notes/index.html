                <div class="self-grade">
                    <span class="self-grade-label">對照後自我評量：</span>
                    <button type="button" onclick="${handler}, true)">✅ 我答對了</button>
                    <button type="button" onclick="${handler}, false)">✍️ 我需加強</button>
                </div>`;
        }
        function selfGradeDone(btn, ok) {
            const row = btn.closest('.self-grade');
            row.innerHTML = `<span class="sg-done" style="color:${ok ? 'var(--accent-green, #059669)' : 'var(--accent-rose, #e11d48)'};">${ok ? '✅ 已記錄：答對' : '✍️ 已記錄：列入錯題本'}</span>`;
        }
        function selfGradeBank(btn, uid, ok) {
            const q = bankIndex[uid];
            if (!q) return;
            recordResult('bank', bankKey(q), ok, q.node);
            selfGradeDone(btn, ok);
        }
        function selfGradeExam(btn, key, ok) {
            const entry = examPractice.find(e => e.year + '_' + e.q === key);
            recordResult('exam', key + '#ns', ok, entry ? entry.nodes : []);
            selfGradeDone(btn, ok);
            resizeExamBody(btn);
        }

        // ===== 歷屆試題選擇題作答邏輯與狀態 =====
        const examMCSel = {};
        const examMCGraded = {}; // 防止同一次作答因重複開合詳解而重複記錄

        function parseExamAnswers(ansStr) {
            const results = [];
            let str = (ansStr || '').trim();

            // 匹配子題 (如 Q1：(B)、Q22：(CE)、Q51：非選)
            const subMatches = [...str.matchAll(/(Q\d+|第\s*\d+[-~、]\s*\d+\s*題|第\s*\d+\s*題|Q\d+參)\s*[：:]\s*(非選|\([A-E]+\))/g)];
            if (subMatches.length > 0) {
                subMatches.forEach(m => {
                    const label = m[1];
                    const ansVal = m[2];
                    if (ansVal.startsWith('(')) {
                        const letters = ansVal.replace(/[\(\)]/g, '').split('');
                        results.push({ label, isMC: true, ans: letters });
                    } else {
                        results.push({ label, isMC: false, ans: [] });
                    }
                });
            } else {
                // 單一題目，匹配 (B) 或 (DE)
                const mcMatch = str.match(/^\s*\(([A-E]+)\)/);
                if (mcMatch) {
                    const letters = mcMatch[1].split('');
                    results.push({ label: '', isMC: true, ans: letters });
                } else {
                    results.push({ label: '', isMC: false, ans: [] });
                }
            }
            return results;
        }

        function toggleExamMC(btn, key, qIdx, opt) {
            const item = btn.closest('.exam-item');
            const solBox = item.querySelector('.exam-sol');
            if (solBox && !solBox.hasAttribute('hidden')) return; // 已公布答案時禁止更改

            if (!examMCSel[key]) examMCSel[key] = {};
            if (!examMCSel[key][qIdx]) examMCSel[key][qIdx] = new Set();

            const sel = examMCSel[key][qIdx];
            if (sel.has(opt)) {
                sel.delete(opt);
                btn.classList.remove('selected');
            } else {
                sel.add(opt);
                btn.classList.add('selected');
            }
        }

        function checkExamMC(key, itemEl) {
            const s = examSolutions[key];
            if (!s) return;
            const mcQuestions = parseExamAnswers(s.ans);
            const selections = examMCSel[key] || {};

            mcQuestions.forEach((q, qIdx) => {
                if (!q.isMC) return;

                const sel = selections[qIdx] || new Set();
                const correctSet = new Set(q.ans);
                const isCorrect = sel.size === correctSet.size && [...sel].every(opt => correctSet.has(opt));

                // 有實際作答才記錄；同一次作答重複開合詳解不重複計
                const gKey = key + '#' + qIdx;
                if (sel.size > 0 && !examMCGraded[gKey]) {
                    examMCGraded[gKey] = true;
                    const entry = examPractice.find(x => x.year + '_' + x.q === key);
                    recordResult('exam', gKey, isCorrect, entry ? entry.nodes : []);
                }

                const row = itemEl.querySelector(`#exam-mc-row-${key}-${qIdx}`);
                if (row) {
                    ['A', 'B', 'C', 'D', 'E'].forEach(opt => {
                        const optBtn = row.querySelector(`[data-opt="${opt}"]`);
                        if (optBtn) {
                            optBtn.classList.remove('selected');
                            if (correctSet.has(opt)) {
                                optBtn.classList.add('correct');
                            } else if (sel.has(opt)) {
                                optBtn.classList.add('incorrect');
                            }
                        }
                    });

                    const resultText = row.querySelector(`#exam-mc-result-${key}-${qIdx}`);
                    if (resultText) {
                        resultText.style.display = 'inline-block';
                        if (isCorrect) {
                            resultText.style.color = 'var(--accent-green)';
                            resultText.innerHTML = '🎉 答對了！';
                        } else {
                            resultText.style.color = 'var(--accent-rose)';
                            resultText.innerHTML = `❌ 答錯（正確答案：${q.ans.join('')}）`;
                        }
                    }
                }
            });
        }

        function resetExamMC(key, itemEl) {
            const s = examSolutions[key];
            if (!s) return;
            const mcQuestions = parseExamAnswers(s.ans);

            if (examMCSel[key]) {
                mcQuestions.forEach((q, qIdx) => {
                    if (examMCSel[key][qIdx]) examMCSel[key][qIdx].clear();
                });
            }
            mcQuestions.forEach((q, qIdx) => { delete examMCGraded[key + '#' + qIdx]; });

            mcQuestions.forEach((q, qIdx) => {
                if (!q.isMC) return;
                const row = itemEl.querySelector(`#exam-mc-row-${key}-${qIdx}`);
                if (row) {
                    ['A', 'B', 'C', 'D', 'E'].forEach(opt => {
                        const optBtn = row.querySelector(`[data-opt="${opt}"]`);
                        if (optBtn) optBtn.classList.remove('correct', 'incorrect', 'selected');
                    });
                    const resultText = row.querySelector(`#exam-mc-result-${key}-${qIdx}`);
                    if (resultText) {
                        resultText.style.display = 'none';
                        resultText.textContent = '';
                    }
                }
            });
        }

        // 升級版手寫與繪圖作答區（支援 canvas 手繪與答題紙底圖）
        function handwriteBox(label, uid, sheetFile = '') {
            const style = sheetFile ? `style="background-image: url('assets/exam_crops/${sheetFile}');"` : '';
            return `
            <div class="handwrite">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                    <div class="handwrite-label" style="margin-bottom:0;">✍️ ${label}</div>
                    ${!sheetFile ? `<button class="canvas-tool-btn" id="toggle-mode-btn-${uid}" onclick="toggleWritingMode('${uid}')" style="padding:0.2rem 0.5rem; font-size:0.75rem;">✍️ 切換手寫板</button>` : ''}
                </div>

                <!-- 預設打字輸入框（適用於一般文字非選題） -->
                <textarea class="bank-short-input" id="handwrite-text-${uid}" rows="4" placeholder="請先在此寫下你的作答，或點擊右上角切換至「手寫板」用觸控筆／滑鼠作答..." style="width:100%; border:1px solid var(--border-color); border-radius:6px; padding:0.5rem; font-family:inherit; font-size:0.88rem; outline:none; resize:vertical; display:${sheetFile ? 'none' : 'block'};"></textarea>

                <!-- 繪圖畫布板（有答題紙底圖時預設顯示，無底圖時手寫板顯示） -->
                <div class="canvas-board-wrap" id="board-wrap-${uid}" style="display:${sheetFile ? 'block' : 'none'};">
                    <div class="canvas-toolbar">
                        <button class="canvas-tool-btn active" data-tool="pen" onclick="setCanvasTool('${uid}', 'pen')">✏️ 畫筆</button>
                        <button class="canvas-tool-btn" data-tool="eraser" onclick="setCanvasTool('${uid}', 'eraser')">🧽 橡皮擦</button>
                        <button class="canvas-tool-btn clear-btn" onclick="clearCanvas('${uid}')">🗑️ 重畫</button>
                    </div>
                    <div class="canvas-container">
                        <canvas id="canvas-${uid}" class="draw-canvas" data-sheet="${sheetFile}" ${style}></canvas>
                    </div>
                </div>
            </div>`;
        }

        const EXAM_SHEET_ANSWERS = Object.freeze({
            '111_51_sheet.png': '111_51_ans.png',
            '113_46_sheet.png': '113_46_ans.png',
            '115_49_sheet.png': '115_49_ans.png',
            '115_53_sheet.png': '115_53_ans.png'
        });

        // 歷屆題的「答案與詳解」區塊（非選附手寫作答區與 CER 結構，選擇題附作答按鈕）
        function examSolBlock(e) {
            const key = e.year + '_' + e.q;
            const s = examSolutions[key];
            if (!s) return '';
            const sheetFile = s.sheet || '';
            const hand = s.hand ? handwriteBox(sheetFile ? '答題卷作答區（請直接在底圖格線上作答／手繪）' : '非選作答區（可打字或手寫）', key, sheetFile) : '';

            // 解析選擇題子題
            const mcQuestions = parseExamAnswers(s.ans);
            let mcHtml = '';
            let hasMC = false;

            mcQuestions.forEach((q, qIdx) => {
                if (q.isMC) {
                    hasMC = true;
                    let optionsButtons = '';
                    ['A', 'B', 'C', 'D', 'E'].forEach(opt => {
                        optionsButtons += `
                            <button class="exam-opt-btn" data-opt="${opt}" onclick="toggleExamMC(this, '${key}', ${qIdx}, '${opt}')">${opt}</button>
                        `;
                    });

                    const qTitle = q.label ? `${q.label}作答：` : '選擇題作答：';
                    mcHtml += `
                        <div class="exam-mc-row" id="exam-mc-row-${key}-${qIdx}">
                            <span class="exam-mc-qtitle">${qTitle}</span>
                            <div class="exam-mc-options">${optionsButtons}</div>
                            <span class="exam-mc-result" id="exam-mc-result-${key}-${qIdx}" style="display:none; font-weight:700; margin-left:0.5rem; font-size:0.88rem;"></span>
                        </div>
                    `;
                }
            });

            let mcSection = '';
            if (hasMC) {
                mcSection = `
                    <div class="exam-mc-section">
                        <div class="handwrite-label" style="margin-bottom:0.4rem; color:var(--primary-blue); font-size:0.88rem;">✏️ 選擇題作答區（點選作答，點「顯示答案與詳解」時自動核對）</div>
                        ${mcHtml}
                    </div>
                `;
            }

            // 如果是手繪題，動態在答案區最上方渲染官方手繪滿分答案圖
            const answerSheetFile = EXAM_SHEET_ANSWERS[sheetFile] || '';
            const ansImg = answerSheetFile ? `
                <div style="margin: 0.5rem 0.9rem 0.75rem 0.9rem; padding-bottom: 0.75rem; border-bottom: 1px dashed var(--border-color);">
                    <div style="font-weight:700; color:#047857; font-size:0.85rem; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.25rem;">
                        <span>🎯</span> 官方答題卷手繪滿分答案示範：
                    </div>
                    <img class="exam-crop ${invertCrops ? 'inverted' : ''}" loading="lazy" src="assets/exam_crops/${answerSheetFile}" style="max-width:100%; border:1px solid var(--border-color); border-radius:6px;" alt="手繪題官方答案圖">
                </div>
            ` : '';

            return `
                ${hand}
                ${mcSection}
                <div class="exam-sol-wrap">
                    <button class="exam-sol-btn" onclick="toggleExamSol(this, '${key}')">📖 顯示答案與詳解</button>
                    <div class="exam-sol" hidden>
                        <div class="exam-ans">✅ 答案：${s.ans}</div>
                        ${ansImg}
                        <div class="exam-detail">${s.sol}</div>
                        ${s.cer ? '<div class="cer-note">＊上方以 <b>CER</b>（主張 Claim／證據 Evidence／推理 Reasoning）結構作答，為非選說明題的建議寫法。</div>' : ''}
                        ${mcQuestions.some(q => !q.isMC) ? selfGradeRowHtml(`selfGradeExam(this, '${key}'`) : ''}
                    </div>
                </div>`;
        }

        function resizeExamBody(el) {
            const body = el.closest('.exam-body');
            const item = el.closest('.exam-item');
            if (body && item && item.classList.contains('open')) {
                body.style.maxHeight = body.scrollHeight + 'px';
            }
        }

        // ===== 全域 Canvas 繪圖板控制邏輯 =====
        const canvasStates = {};

        function initCanvas(uid, sheetFile) {
            const canvas = document.getElementById(`canvas-${uid}`);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');

            // 若此畫布尚未註冊狀態，進行註冊
            if (!canvasStates[uid]) {
                canvasStates[uid] = {
                    canvas: canvas,
                    ctx: ctx,
                    isDrawing: false,
                    tool: 'pen',
                    lastX: 0,
                    lastY: 0,
                    sheetFile: sheetFile,
                    sheetRatio: 2.5
                };

                // 綁定事件（僅綁定一次）
                canvas.addEventListener('mousedown', (e) => startDrawing(e, uid));
                canvas.addEventListener('mousemove', (e) => draw(e, uid));
                canvas.addEventListener('mouseup', () => stopDrawing(uid));
                canvas.addEventListener('mouseout', () => stopDrawing(uid));

                // 觸控事件相容
                canvas.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    const mouseEvent = new MouseEvent('mousedown', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    canvas.dispatchEvent(mouseEvent);
                    e.preventDefault();
                }, { passive: false });

                canvas.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    const mouseEvent = new MouseEvent('mousemove', {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    canvas.dispatchEvent(mouseEvent);
                    e.preventDefault();
                }, { passive: false });

                canvas.addEventListener('touchend', () => {
                    const mouseEvent = new MouseEvent('mouseup', {});
                    canvas.dispatchEvent(mouseEvent);
                });

                // 監聽視窗大小改變，自動調整 canvas 比例
                window.addEventListener('resize', () => resizeCanvas(uid));

                // 依答案卡底圖的原始尺寸設定畫布比例，避免不同年度作答區被壓扁或裁切。
                if (sheetFile) {
                    const sheetImage = new Image();
                    sheetImage.onload = () => {
                        if (!sheetImage.naturalWidth || !sheetImage.naturalHeight) return;
                        canvasStates[uid].sheetRatio = sheetImage.naturalWidth / sheetImage.naturalHeight;
                        resizeCanvas(uid);
                        resizeExamBody(canvas);
                    };
                    sheetImage.src = `assets/exam_crops/${sheetFile}`;
                }
            }

            // 每次展開時重新 resize 確保寬高尺寸正確
            resizeCanvas(uid);
        }

        function resizeCanvas(uid) {
            const state = canvasStates[uid];
            if (!state) return;
            const canvas = state.canvas;
            const ctx = state.ctx;

            const container = canvas.parentElement;
            const width = container.clientWidth || 500;

            const ratio = state.sheetRatio || 2.5;
            const height = width / ratio;

            // 備份現有內容以免 resize 後筆跡被清空
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            if (canvas.width > 0 && canvas.height > 0) {
                tempCtx.drawImage(canvas, 0, 0);
            }

            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = width * dpr;
            canvas.height = height * dpr;

            ctx.scale(dpr, dpr);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 恢復畫筆與橡皮擦狀態
            if (state.tool === 'pen') {
                ctx.strokeStyle = '#1d4ed8'; // 大考常用原子筆藍色
                ctx.lineWidth = 2.5;
                ctx.globalCompositeOperation = 'source-over';
            } else {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 15;
                ctx.globalCompositeOperation = 'destination-out';
            }

            // 貼回舊筆跡
            if (tempCanvas.width > 0 && tempCanvas.height > 0) {
                ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width / dpr, tempCanvas.height / dpr, 0, 0, width, height);
            }
        }

        function startDrawing(e, uid) {
            const state = canvasStates[uid];
            if (!state) return;
            state.isDrawing = true;

            const rect = state.canvas.getBoundingClientRect();
            state.lastX = e.clientX - rect.left;
            state.lastY = e.clientY - rect.top;
        }

        function draw(e, uid) {
            const state = canvasStates[uid];
            if (!state || !state.isDrawing) return;

            const rect = state.canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const ctx = state.ctx;
            ctx.beginPath();
            ctx.moveTo(state.lastX, state.lastY);
            ctx.lineTo(x, y);

            if (state.tool === 'pen') {
                ctx.strokeStyle = '#1d4ed8'; // 大考原子筆藍色
                ctx.lineWidth = 2.5;
                ctx.globalCompositeOperation = 'source-over';
            } else {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 15;
                ctx.globalCompositeOperation = 'destination-out';
            }
            ctx.stroke();

            state.lastX = x;
            state.lastY = y;
        }

        function stopDrawing(uid) {
            const state = canvasStates[uid];
            if (state) state.isDrawing = false;
        }

        function setCanvasTool(uid, tool) {
            const state = canvasStates[uid];
            if (!state) return;
            state.tool = tool;

            const wrap = document.getElementById(`board-wrap-${uid}`);
            if (wrap) {
                wrap.querySelectorAll('.canvas-tool-btn').forEach(btn => {
                    if (btn.getAttribute('data-tool') === tool) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
        }

        function clearCanvas(uid) {
            const state = canvasStates[uid];
            if (!state) return;
            state.ctx.clearRect(0, 0, state.canvas.width, state.canvas.height);
        }

        function toggleWritingMode(uid) {
            const textEl = document.getElementById(`handwrite-text-${uid}`);
            const boardEl = document.getElementById(`board-wrap-${uid}`);
            const toggleBtn = document.getElementById(`toggle-mode-btn-${uid}`);

            if (textEl.style.display === 'none') {
                textEl.style.display = 'block';
                boardEl.style.display = 'none';
                toggleBtn.textContent = '✍️ 切換手寫板';
                resizeExamBody(toggleBtn);
            } else {
                textEl.style.display = 'none';
                boardEl.style.display = 'block';
                toggleBtn.textContent = '⌨️ 切換打字框';
                setTimeout(() => {
                    initCanvas(uid, '');
                    resizeExamBody(toggleBtn);
                }, 50);
            }
        }

        function toggleExamSol(btn, key) {
            const item = btn.closest('.exam-item');
            const box = btn.parentElement.querySelector('.exam-sol');
            if (box.hasAttribute('hidden')) {
                box.removeAttribute('hidden');
                btn.textContent = '📖 收合答案與詳解';

                // 核對選擇題答案
                checkExamMC(key, item);

                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise([box]).then(() => resizeExamBody(btn));
                }
            } else {
                box.setAttribute('hidden', '');
                btn.textContent = '📖 顯示答案與詳解';

                // 重設選擇題答案以重新練習
                resetExamMC(key, item);
            }
            resizeExamBody(btn);
        }

        function setExamYear(y) {
            examYearFilter = y;
            renderExamsView();
        }

        function setShow99(v) {
            show99 = v;
            // 若關閉 99 課綱時正停在 99 課綱的篩選，退回全部
            if (!show99 && examYearFilter !== 'all' && examPapers[examYearFilter] && examPapers[examYearFilter].cur === '99') {
                examYearFilter = 'all';
            }
            if (currentView === 'stats') renderStatsView();
            else renderExamsView();
        }

        function toggleInvertCrops(v) {
            invertCrops = v;
            document.querySelectorAll('.exam-crop').forEach(img => {
                img.classList.toggle('inverted', invertCrops);
            });
        }

        // 從命題矩陣點某節點 → 跳到歷屆試題並篩選該節點
        function showExamsForNode(nodeId) {
            examNodeFilter = nodeId;
            examYearFilter = 'all';
            // 若該節點只有 99 課綱的題，自動開啟 99 課綱以免空白
            const cnt = nodeExamCounts(nodeId);
            if (cnt.c108 === 0 && cnt.c99 > 0) show99 = true;
            document.querySelectorAll('.nav-item').forEach(el => {
                const oc = el.getAttribute('onclick') || '';
                el.classList.toggle('active', oc.includes("'tool-exams'"));
            });
            renderExamsView();
            window.scrollTo(0, 0);
        }
        function clearExamNode() {
            examNodeFilter = 'all';
            renderExamsView();
        }


        // Initialize sidebar (26 節點導航) and land on the first node
        window.addEventListener('load', () => {
            buildNodeSidebar();
            const firstNode = document.querySelector('.nav-item-node');
            if (firstNode) firstNode.classList.add('active');
            renderNodeView('N01');
            updateWrongNavBadge();
        });

    </script>
    <script src="interaction-compat.js?v=3"></script>
